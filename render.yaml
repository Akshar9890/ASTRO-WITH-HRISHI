services:
  - type: web
    name: astro-hrishi-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_DIR
        value: /data
      - key: ADMIN_SECRET
        sync: false   # Set this manually in Render dashboard
      - key: PORT
        value: "5001"
    disk:
      name: astro-db
      mountPath: /data
      sizeGB: 1
